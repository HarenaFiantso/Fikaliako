spring:
  application:
    name: api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/fikaliako}
    username: ${DB_USER:fikaliako}
    password: ${DB_PASSWORD:fikaliako}

  jpa:
    # Flyway owns the schema; Hibernate only validates
    hibernate:
      ddl-auto: validate
    open-in-view: false

  jackson:
    # Contract uses snake_case (avg_price_ar, next_cursor, open_now — book ch. 8).
    # Jackson 3 (Boot 4) already renders java.time types as ISO-8601 strings by
    # default, so no date-timestamp toggle is needed.
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  flyway:
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

fikaliako:
  auth:
    # HS256 signing secret, >= 32 bytes. The dev default is for local use only;
    # production MUST set AUTH_JWT_SECRET.
    jwt-secret: ${AUTH_JWT_SECRET:dev-only-fikaliako-jwt-secret-0123456789abcdef}
    issuer: fikaliako-api
    # Short-lived access JWTs + revocable refresh tokens (book ch. 7.3)
    access-token-ttl: 15m
    refresh-token-ttl: 30d
    otp-ttl: 10m
    # 5 OTP sends/hour/number and 5 guesses per code (book ch. 7.3)
    otp-max-per-hour: 5
    otp-max-attempts: 5

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
