spring:
  application:
    name: api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/fikaliako}
    username: ${DB_USER:fikaliako}
    password: ${DB_PASSWORD:fikaliako}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  flyway:
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

fikaliako:
  auth:
    jwt-secret: ${AUTH_JWT_SECRET:dev-only-fikaliako-jwt-secret-0123456789abcdef}
    issuer: fikaliako-api
    access-token-ttl: 15m
    refresh-token-ttl: 30d
    otp-ttl: 10m
    otp-max-per-hour: 5
    otp-max-attempts: 5
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
