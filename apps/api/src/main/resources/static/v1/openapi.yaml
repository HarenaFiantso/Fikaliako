openapi: 3.1.0

info:
  title: Fikaliako API
  version: 0.3.0
  summary: Geolocated food discovery for Madagascar
  description: |
    REST API of **Fikaliako**, the platform for discovering places to eat in
    Madagascar — restaurants, gargottes, cafés, street vendors — around you.

    ## Contract-first

    This document is the **manually managed source of truth** for the API
    (project book ch. 7.1, "one source contract"). It is written by hand,
    versioned with the code in
    `apps/api/src/main/resources/static/v1/openapi.yaml`, and served at
    `/v1/openapi.yaml`. Controllers are implemented **against** this contract,
    and the TypeScript client types for `apps/web` are generated **from** it.
    When behaviour and spec disagree, the spec wins: fix the code or amend the
    spec in the same change.

    Endpoints not yet implemented are marked with a (planned) note in their
    description; they define the target contract for the modules to come.

    ## Authentication (project book ch. 4.7, 7.3)

    Identity is the **E.164 phone number** — no email at MVP; phone
    verification and password reset are OTP SMS flows. `POST /v1/auth/login`
    (or `verify-phone` on signup) returns a 15-minute HS256 **access JWT**
    plus an opaque, revocable **refresh token**:

    - Send the access token as `Authorization: Bearer <token>`.
    - `POST /v1/auth/refresh` rotates the refresh token; each token is
      single-use and replaying a rotated token revokes the whole session.
    - `POST /v1/auth/logout` revokes the session server-side; password reset
      and change revoke every session of the account.

    Roles (the `role` claim): `user` (consumer), `business` (premium
    establishment account — manages its establishments under
    `/v1/business/**`), `moderator`, and `admin` (back-office,
    `/v1/admin/**`).

    ## Conventions

    - All endpoints are rooted at `/v1`.
    - Reads (`GET`) are public; writes require authentication, and the
      `/v1/business` and `/v1/admin` trees additionally require the matching
      role (403 otherwise).
    - Errors use RFC 9457 Problem Details (`application/problem+json`) and carry
      a `correlation_id`, also returned in the `X-Correlation-Id` header.
    - Prices are integers in **ariary** (`*_ar` fields).
    - Coordinates are WGS 84 (SRID 4326): `lat` ∈ [-90, 90], `lng` ∈ [-180, 180].
    - Times are local (Indian/Antananarivo), `HH:mm`; days of week are
      `0` = Monday … `6` = Sunday.
    - Lists are cursor-paginated: pass the returned `next_cursor` back as
      `?cursor=` to fetch the next page. A null/absent `next_cursor` is the end.
    - Fields that are null are omitted from responses.
  contact:
    name: Fikaliako

servers:
  - url: http://localhost:8080
    description: Local development

security: []

tags:
  - name: Health
    description: Liveness and service metadata.
  - name: Auth
    description: >
      Phone-number accounts (book ch. 4.7): registration, OTP verification,
      login, token rotation and the password lifecycle.
  - name: Establishments
    description: Browse and read establishments (restaurants, gargottes, vendors…).
  - name: Search
    description: Geolocated and text discovery.
  - name: Reviews
    description: Five-criteria community reviews.
  - name: Account
    description: The authenticated user's profile and favorites.
  - name: Business
    description: >
      Premium establishment accounts (`business` role) managing the profile of
      the establishments an admin granted them.
  - name: Admin
    description: Back-office (`admin` role) — manager grants, audit-logged.

paths:
  /v1/ping:
    get:
      tags: [Health]
      operationId: ping
      summary: Service liveness probe
      description: >
        Lightweight liveness check used by the web app's home page. Returns
        the service identity and a greeting. For operational health checks
        prefer the actuator endpoint (`/actuator/health`).
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
              example:
                service: fikaliako-api
                message: "Aiza no hisakafo androany ?"

  /v1/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Create an account
      description: >
        Creates a phone-number account (project book ch. 4.7). `account_type`
        picks the role: `consumer` (default) or `business` (premium
        establishment account — managing an establishment additionally
        requires an admin-granted link). The password is hashed with Argon2id
        and a 6-digit verification code is sent by SMS; the account cannot log
        in until `/v1/auth/verify-phone` succeeds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created; verification code sent by SMS.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/auth/verify-phone:
    post:
      tags: [Auth]
      operationId: verifyPhone
      summary: Verify the phone number with the SMS code
      description: >
        Consumes the 6-digit code (10-minute lifetime, 5 attempts) and opens
        the first session. Whether a number is registered is never revealed:
        an unknown number answers the same 400 as a bad code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPhoneRequest"
      responses:
        "200":
          description: Phone verified; the account is now active.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/auth/resend-otp:
    post:
      tags: [Auth]
      operationId: resendOtp
      summary: Re-send the verification code
      description: >
        Always answers 202 so account existence is not revealed. Issuance is
        capped at 5 codes/hour/number (book ch. 7.3).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendOtpRequest"
      responses:
        "202":
          description: If the number has an unverified account, a code was sent.
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Log in with phone number and password
      description: >
        Opens a session: a 15-minute access JWT plus a 30-day single-use
        refresh token. Unverified phones get a 403 pointing at
        `/v1/auth/verify-phone`; suspended accounts get a 403 too.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshTokens
      summary: Rotate the refresh token
      description: >
        Exchanges a live refresh token for a fresh access JWT and a new
        refresh token. Each refresh token is single-use: presenting an
        already-rotated one is treated as theft and revokes the whole session
        family.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Log out (revoke the session)
      description: >
        Revokes the session the refresh token belongs to, server-side and
        idempotently. The current access token stays valid for its remaining
        lifetime (≤ 15 min) — clients should also drop it locally.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Session revoked (or the token was already unknown).
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Request a password-reset code
      description: >
        Sends a reset code by SMS if the number has an account. Always answers
        202 so account existence is not revealed; issuance shares the
        5/hour/number cap.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "202":
          description: If the number has an account, a reset code was sent.
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Reset the password with the SMS code
      description: >
        Sets a new password after validating the reset code, then revokes
        every live session of the account (the reset proves control of the
        number, not of every device).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "204":
          description: Password changed; all sessions revoked. Log in again.
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/auth/change-password:
    post:
      tags: [Auth]
      operationId: changePassword
      summary: Change the password (authenticated)
      description: >
        Requires the current password. Every other session is revoked and a
        fresh token pair is returned so the calling device stays logged in.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed; fresh tokens for this device.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/nearby:
    get:
      tags: [Search]
      operationId: nearby
      summary: Establishments near a point, cheapest first
      description: >
        The core discovery query (project book ch. 6.2): active establishments
        within `radius` metres of (`lat`, `lng`), ordered cheapest first then by
        distance. Uses `ST_DWithin` on the GiST index; target < 300 ms p95.
        The result set is bounded by `radius` and `limit`, so it is **not**
        cursor-paginated (`next_cursor` is always absent).
      parameters:
        - name: lat
          in: query
          required: true
          schema: { type: number, format: double, minimum: -90, maximum: 90 }
        - name: lng
          in: query
          required: true
          schema: { type: number, format: double, minimum: -180, maximum: 180 }
        - name: radius
          in: query
          description: Search radius in metres (default 1000, max 5000).
          schema: { type: number, format: double, default: 1000, maximum: 5000 }
        - $ref: "#/components/parameters/TypeFilter"
        - $ref: "#/components/parameters/MinPriceFilter"
        - $ref: "#/components/parameters/MaxPriceFilter"
        - $ref: "#/components/parameters/CuisineFilter"
        - $ref: "#/components/parameters/PaymentFilter"
        - $ref: "#/components/parameters/BooleanFilters"
        - $ref: "#/components/parameters/OpenNowFilter"
        - name: limit
          in: query
          description: Max results (default 50, max 200 — the client clustering threshold).
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Ordered nearby results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstablishmentPage"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/search:
    get:
      tags: [Search]
      operationId: search
      summary: Typo-tolerant text search (planned)
      description: >
        (planned) Full-text search backed by Meilisearch synced from Postgres
        (project book ch. 7.2). Same combinable filters as `/v1/nearby`, plus a
        free-text `q`. Arrives with the search module.
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: Matching establishments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstablishmentPage"

  /v1/establishments:
    get:
      tags: [Establishments]
      operationId: listEstablishments
      summary: Browse establishments
      description: >
        Active establishments, newest first, cursor-paginated. Filters combine
        (project book ch. 4.3).
      parameters:
        - $ref: "#/components/parameters/TypeFilter"
        - $ref: "#/components/parameters/MinPriceFilter"
        - $ref: "#/components/parameters/MaxPriceFilter"
        - $ref: "#/components/parameters/CuisineFilter"
        - $ref: "#/components/parameters/PaymentFilter"
        - $ref: "#/components/parameters/BooleanFilters"
        - $ref: "#/components/parameters/OpenNowFilter"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: A page of establishments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstablishmentPage"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      tags: [Establishments]
      operationId: proposeEstablishment
      summary: Propose a new establishment (planned)
      description: >
        (planned) Community contribution — anyone connected can propose a new
        establishment, positioned by dropping a pin (project book ch. 4.8). Goes
        through the moderation queue. Arrives with the community module.
      security:
        - bearerAuth: []
      responses:
        "202":
          description: Proposal accepted for moderation.

  /v1/establishments/{idOrSlug}:
    get:
      tags: [Establishments]
      operationId: getEstablishment
      summary: Establishment detail
      description: >
        Full detail for one establishment, resolvable by UUID or SEO slug (the
        slug path powers Google-indexable pages — project book ch. 11.3).
        `open_now` is computed server-side in Indian/Antananarivo.
      parameters:
        - name: idOrSlug
          in: path
          required: true
          description: The establishment UUID or its slug.
          schema: { type: string }
      responses:
        "200":
          description: The establishment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstablishmentDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/establishments/{establishmentId}/reviews:
    get:
      tags: [Reviews]
      operationId: listReviews
      summary: Reviews for an establishment
      description: Published reviews, newest first, cursor-paginated.
      parameters:
        - $ref: "#/components/parameters/EstablishmentId"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: A page of reviews.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewPage"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Reviews]
      operationId: createReview
      summary: Post a review
      description: >
        One review per user per establishment, scored 1–5 on five criteria
        (project book ch. 4.4). The global note is the weighted mean with
        quality counted twice. A second review from the same account is a 409.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EstablishmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/users/me:
    get:
      tags: [Account]
      operationId: getCurrentUser
      summary: Current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Account]
      operationId: updateCurrentUser
      summary: Update the profile
      description: Partial update — absent fields stay untouched.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: The updated profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/users/me/favorites:
    get:
      tags: [Account]
      operationId: listFavorites
      summary: The user's favorites
      description: >
        Favorited establishments, most recently added first, cursor-paginated
        (project book ch. 4.6).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/CursorParam"
      responses:
        "200":
          description: A page of favorited establishments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstablishmentPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/users/me/favorites/{establishmentId}:
    put:
      tags: [Account]
      operationId: addFavorite
      summary: Add a favorite
      description: Idempotent add to the user's favorites (project book ch. 4.6).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EstablishmentId"
      responses:
        "204":
          description: Favorited (already-favorited is not an error).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Account]
      operationId: removeFavorite
      summary: Remove a favorite
      description: Idempotent removal from the user's favorites.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EstablishmentId"
      responses:
        "204":
          description: Un-favorited (or was never favorited).
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/business/establishments:
    get:
      tags: [Business]
      operationId: listManagedEstablishments
      summary: Establishments managed by this account
      description: >
        The establishments an admin granted this `business` account. One page,
        no cursor — an account manages a handful at most.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: The managed establishments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstablishmentPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/business/establishments/{establishmentId}:
    patch:
      tags: [Business]
      operationId: updateManagedEstablishment
      summary: Update the business profile
      description: >
        Partial update of an establishment this account manages: contact
        fields, average price, amenities, and `active`/`closed` status.
        Position changes go through the community loop (book ch. 4.8) and
        `verified` is a moderator act — neither is editable here. Admins pass
        the ownership check.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EstablishmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessEstablishmentUpdate"
      responses:
        "200":
          description: The updated establishment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstablishmentDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/business/establishments/{establishmentId}/opening-hours:
    put:
      tags: [Business]
      operationId: replaceOpeningHours
      summary: Replace the opening hours
      description: >
        Full replacement of the opening intervals (multiple per day allowed,
        day 0 = Monday — book ch. 6.1).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EstablishmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpeningHoursUpdate"
      responses:
        "200":
          description: The establishment with its new hours.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstablishmentDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/establishments/{establishmentId}/managers:
    get:
      tags: [Admin]
      operationId: listEstablishmentManagers
      summary: Managers of an establishment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EstablishmentId"
      responses:
        "200":
          description: The accounts managing this establishment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagerPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/establishments/{establishmentId}/managers/{userId}:
    put:
      tags: [Admin]
      operationId: grantEstablishmentManager
      summary: Grant management of an establishment
      description: >
        Links a `business` account to the establishment. Idempotent; every
        effective grant lands in the immutable audit log (book ch. 7.3).
        Granting to a non-business account is a 400.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EstablishmentId"
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: Granted (or already granted).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Admin]
      operationId: revokeEstablishmentManager
      summary: Revoke management of an establishment
      description: Idempotent; effective revocations are audit-logged.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EstablishmentId"
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: Revoked (or was never granted).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        15-minute HS256 access token from `/v1/auth/login`,
        `/v1/auth/verify-phone` or `/v1/auth/refresh` (project book ch. 7.3).
        Carries the user id (`sub`) and a `role` claim
        (user/business/moderator/admin) that gates the `/v1/business` and
        `/v1/admin` trees.

  parameters:
    LimitParam:
      name: limit
      in: query
      description: Page size (default 50 for establishments, 20 for reviews; max 100).
      schema: { type: integer, minimum: 1, maximum: 100 }
    CursorParam:
      name: cursor
      in: query
      description: Opaque pagination cursor from a previous response's `next_cursor`.
      schema: { type: string }
    EstablishmentId:
      name: establishmentId
      in: path
      required: true
      description: Establishment UUID.
      schema: { type: string, format: uuid }
    UserId:
      name: userId
      in: path
      required: true
      description: User account UUID.
      schema: { type: string, format: uuid }
    TypeFilter:
      name: type
      in: query
      description: Filter by establishment type.
      schema:
        $ref: "#/components/schemas/EstablishmentType"
    MinPriceFilter:
      name: min_price
      in: query
      description: Minimum average price in ariary.
      schema: { type: integer, minimum: 0 }
    MaxPriceFilter:
      name: max_price
      in: query
      description: Maximum average price in ariary (the budget king filter, book ch. 3).
      schema: { type: integer, minimum: 0 }
    CuisineFilter:
      name: cuisine
      in: query
      description: Filter by cuisine referential code (e.g. `malagasy`, `grill`).
      schema: { type: string }
    PaymentFilter:
      name: payment
      in: query
      description: >
        A payment-method code (e.g. `mvola`) or the literal `mobile` to match any
        mobile-money operator (book ch. 4.3).
      schema: { type: string }
    BooleanFilters:
      name: filters
      in: query
      description: >
        Comma-separated boolean amenities that must all be true. One of:
        `delivery, parking, wifi, wheelchair_access, air_conditioning, terrace,
        family_friendly, romantic, student_friendly, scenic_view, open_24h`.
      schema: { type: string }
    OpenNowFilter:
      name: open_now
      in: query
      description: When true, keep only establishments open now (Indian/Antananarivo).
      schema: { type: boolean, default: false }

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing/invalid bearer token, or invalid credentials.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Authenticated but not allowed to perform this action.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Conflict:
      description: The request conflicts with existing state.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    TooManyRequests:
      description: Rate limit hit (e.g. 5 OTP codes/hour/number).
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    PingResponse:
      type: object
      description: Service identity and greeting.
      required: [service, message]
      properties:
        service:
          type: string
          description: Service identifier.
          examples: [fikaliako-api]
        message:
          type: string
          description: Human greeting, in Malagasy.
          examples: ["Aiza no hisakafo androany ?"]

    Problem:
      type: object
      description: RFC 9457 problem detail.
      required: [status, title]
      properties:
        type: { type: string, format: uri, default: "about:blank" }
        title: { type: string, examples: ["Not found"] }
        status: { type: integer, examples: [404] }
        detail: { type: string, examples: ["Establishment 'nope' not found."] }
        instance: { type: string, examples: ["/v1/establishments/nope"] }
        correlation_id:
          type: string
          description: Echoes the `X-Correlation-Id` response header.

    PhoneNumber:
      type: string
      description: E.164 phone number — the account identifier (book ch. 4.7).
      pattern: "^\\+[1-9][0-9]{7,14}$"
      examples: ["+261340000001"]

    OtpCode:
      type: string
      description: 6-digit one-time code received by SMS.
      pattern: "^[0-9]{6}$"
      examples: ["123456"]

    UserRole:
      type: string
      description: >
        Account role: `user` = consumer, `business` = premium establishment
        account, `moderator` and `admin` = back-office.
      enum: [user, business, moderator, admin]

    UserProfile:
      type: object
      description: The account as its owner sees it.
      required: [id, phone, display_name, role, phone_verified, locale, created_at]
      properties:
        id: { type: string, format: uuid }
        phone:
          $ref: "#/components/schemas/PhoneNumber"
        display_name: { type: string, examples: [Naina] }
        role:
          $ref: "#/components/schemas/UserRole"
        phone_verified: { type: boolean }
        locale: { type: string, enum: [fr, mg] }
        created_at: { type: string, format: date-time }

    RegisterRequest:
      type: object
      required: [phone, password, display_name]
      properties:
        phone:
          $ref: "#/components/schemas/PhoneNumber"
        password: { type: string, minLength: 8, maxLength: 128 }
        display_name: { type: string, minLength: 2, maxLength: 60 }
        account_type:
          type: string
          description: >
            `consumer` (default) or `business` — a premium establishment
            account (restaurant, gargotte, café…).
          enum: [consumer, business]
          default: consumer
        locale: { type: string, enum: [fr, mg], default: fr }

    VerifyPhoneRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          $ref: "#/components/schemas/PhoneNumber"
        code:
          $ref: "#/components/schemas/OtpCode"

    ResendOtpRequest:
      type: object
      required: [phone]
      properties:
        phone:
          $ref: "#/components/schemas/PhoneNumber"

    LoginRequest:
      type: object
      required: [phone, password]
      properties:
        phone:
          $ref: "#/components/schemas/PhoneNumber"
        password: { type: string }

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    ForgotPasswordRequest:
      type: object
      required: [phone]
      properties:
        phone:
          $ref: "#/components/schemas/PhoneNumber"

    ResetPasswordRequest:
      type: object
      required: [phone, code, new_password]
      properties:
        phone:
          $ref: "#/components/schemas/PhoneNumber"
        code:
          $ref: "#/components/schemas/OtpCode"
        new_password: { type: string, minLength: 8, maxLength: 128 }

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password: { type: string }
        new_password: { type: string, minLength: 8, maxLength: 128 }

    AuthTokens:
      type: object
      description: >
        A session: short-lived access JWT plus the single-use refresh token
        (book ch. 7.3). Store the refresh token securely — it is shown once.
      required: [token_type, access_token, expires_in, refresh_token, refresh_expires_in]
      properties:
        token_type: { type: string, enum: [Bearer] }
        access_token: { type: string, description: "HS256 JWT, 15-minute lifetime." }
        expires_in:
          type: integer
          format: int64
          description: Access-token lifetime in seconds.
          examples: [900]
        refresh_token:
          type: string
          description: Opaque, single-use; rotate via `/v1/auth/refresh`.
        refresh_expires_in:
          type: integer
          format: int64
          description: Refresh-token lifetime in seconds.
          examples: [2592000]

    AuthSession:
      type: object
      description: Login/verification result — the user and their tokens.
      required: [user, tokens]
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        tokens:
          $ref: "#/components/schemas/AuthTokens"

    UpdateProfileRequest:
      type: object
      description: Partial profile update — absent fields stay untouched.
      properties:
        display_name: { type: string, minLength: 2, maxLength: 60 }
        locale: { type: string, enum: [fr, mg] }

    EstablishmentType:
      type: string
      description: Kind of eatery (project book ch. 6.1).
      enum:
        - restaurant
        - gargotte
        - cafe
        - snack
        - food_truck
        - street_vendor
        - pastry_shop
        - bar_restaurant
        - hotel_restaurant

    GeoPoint:
      type: object
      description: WGS 84 coordinate (SRID 4326).
      required: [lat, lng]
      properties:
        lat: { type: number, format: double, examples: [-18.9092] }
        lng: { type: number, format: double, examples: [47.5210] }

    ReferentialItem:
      type: object
      description: A referential entry with bilingual labels (FR + MG).
      required: [code, label_fr, label_mg]
      properties:
        code: { type: string, examples: [mvola] }
        label_fr: { type: string, examples: [MVola] }
        label_mg: { type: string, examples: [MVola] }

    Amenities:
      type: object
      description: The one-query boolean attributes (project book ch. 4.3 / 6.1).
      required:
        - delivery
        - parking
        - wifi
        - wheelchair_access
        - air_conditioning
        - terrace
        - family_friendly
        - romantic
        - student_friendly
        - scenic_view
        - open_24h
      properties:
        delivery: { type: boolean }
        parking: { type: boolean }
        wifi: { type: boolean }
        wheelchair_access: { type: boolean }
        air_conditioning: { type: boolean }
        terrace: { type: boolean }
        family_friendly: { type: boolean }
        romantic: { type: boolean }
        student_friendly: { type: boolean }
        scenic_view: { type: boolean }
        open_24h: { type: boolean }

    OpeningInterval:
      type: object
      description: One opening interval; days are 0 = Monday … 6 = Sunday.
      required: [day_of_week, opens_at, closes_at]
      properties:
        day_of_week: { type: integer, minimum: 0, maximum: 6 }
        opens_at: { type: string, examples: ["07:00"] }
        closes_at: { type: string, examples: ["21:00"] }

    RatingSummary:
      type: object
      description: >
        Aggregated ratings, recomputed nightly (project book ch. 4.5). Per-criterion
        and Bayesian fields are absent until an establishment has reviews.
      required: [count]
      properties:
        count: { type: integer, examples: [12] }
        avg_global: { type: number, examples: [4.5] }
        avg_quality: { type: number }
        avg_price: { type: number }
        avg_cleanliness: { type: number }
        avg_speed: { type: number }
        avg_welcome: { type: number }
        bayesian_note:
          type: number
          description: Dampened score used for rankings.

    EstablishmentSummary:
      type: object
      description: Card-level projection for lists and nearby results.
      required: [id, slug, name, type, position, verified, status, rating_count]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string, examples: [gargotte-chez-bao] }
        name: { type: string, examples: ["Gargotte Chez Bao"] }
        type:
          $ref: "#/components/schemas/EstablishmentType"
        position:
          $ref: "#/components/schemas/GeoPoint"
        avg_price_ar: { type: integer, examples: [2500] }
        verified: { type: boolean }
        status: { type: string, enum: [active, closed, pending] }
        rating_avg: { type: number, examples: [4.5] }
        rating_count: { type: integer, examples: [12] }
        distance_m:
          type: number
          description: Metres from the query point; present only on `/v1/nearby`.
          examples: [30.5]

    EstablishmentDetail:
      type: object
      description: Full establishment detail (project book ch. 8.2 — detail page).
      required:
        - id
        - slug
        - name
        - type
        - position
        - city
        - verified
        - status
        - open_now
        - amenities
        - opening_hours
        - payment_methods
        - cuisines
        - rating
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        type:
          $ref: "#/components/schemas/EstablishmentType"
        position:
          $ref: "#/components/schemas/GeoPoint"
        address: { type: string }
        district: { type: string, examples: [Analakely] }
        city: { type: string, examples: [Antananarivo] }
        phone: { type: string }
        whatsapp: { type: string }
        facebook_url: { type: string }
        website: { type: string }
        avg_price_ar: { type: integer }
        verified: { type: boolean }
        status: { type: string, enum: [active, closed, pending] }
        open_now:
          type: boolean
          description: Computed server-side in Indian/Antananarivo.
        amenities:
          $ref: "#/components/schemas/Amenities"
        opening_hours:
          type: array
          items:
            $ref: "#/components/schemas/OpeningInterval"
        payment_methods:
          type: array
          items:
            $ref: "#/components/schemas/ReferentialItem"
        cuisines:
          type: array
          items:
            $ref: "#/components/schemas/ReferentialItem"
        rating:
          $ref: "#/components/schemas/RatingSummary"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    BusinessEstablishmentUpdate:
      type: object
      description: >
        Partial business-profile update; absent fields stay untouched.
        Position and `verified` are not editable through this endpoint.
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        address: { type: string, maxLength: 255 }
        district: { type: string, maxLength: 120 }
        phone: { type: string, maxLength: 30 }
        whatsapp: { type: string, maxLength: 30 }
        facebook_url: { type: string, maxLength: 255 }
        website: { type: string, maxLength: 255 }
        avg_price_ar: { type: integer, minimum: 0 }
        status:
          type: string
          description: An owner can close or reopen, not self-approve out of `pending`.
          enum: [active, closed]
        amenities:
          $ref: "#/components/schemas/AmenitiesUpdate"

    AmenitiesUpdate:
      type: object
      description: Partial amenities update — absent flags stay untouched.
      properties:
        delivery: { type: boolean }
        parking: { type: boolean }
        wifi: { type: boolean }
        wheelchair_access: { type: boolean }
        air_conditioning: { type: boolean }
        terrace: { type: boolean }
        family_friendly: { type: boolean }
        romantic: { type: boolean }
        student_friendly: { type: boolean }
        scenic_view: { type: boolean }
        open_24h: { type: boolean }

    OpeningHoursUpdate:
      type: object
      description: Full replacement of an establishment's opening intervals.
      required: [intervals]
      properties:
        intervals:
          type: array
          items:
            $ref: "#/components/schemas/OpeningInterval"

    ManagerItem:
      type: object
      description: A business account managing an establishment.
      required: [user_id, display_name, phone, granted_at]
      properties:
        user_id: { type: string, format: uuid }
        display_name: { type: string, examples: [Chez Bao] }
        phone:
          $ref: "#/components/schemas/PhoneNumber"
        granted_at: { type: string, format: date-time }

    ManagerPage:
      type: object
      description: The managers of one establishment (no pagination).
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ManagerItem"

    ReviewItem:
      type: object
      description: A published review (project book ch. 4.4).
      required:
        - id
        - author_name
        - rating_quality
        - rating_price
        - rating_cleanliness
        - rating_speed
        - rating_welcome
        - global_note
        - created_at
      properties:
        id: { type: string, format: uuid }
        author_name: { type: string, examples: [Naina] }
        rating_quality: { type: integer, minimum: 1, maximum: 5 }
        rating_price: { type: integer, minimum: 1, maximum: 5 }
        rating_cleanliness: { type: integer, minimum: 1, maximum: 5 }
        rating_speed: { type: integer, minimum: 1, maximum: 5 }
        rating_welcome: { type: integer, minimum: 1, maximum: 5 }
        global_note:
          type: number
          description: Weighted mean with quality counted twice (weights sum to 6).
          examples: [4.67]
        comment: { type: string }
        created_at: { type: string, format: date-time }

    ReviewInput:
      type: object
      description: Payload to create a review.
      required:
        - rating_quality
        - rating_price
        - rating_cleanliness
        - rating_speed
        - rating_welcome
      properties:
        rating_quality: { type: integer, minimum: 1, maximum: 5 }
        rating_price: { type: integer, minimum: 1, maximum: 5 }
        rating_cleanliness: { type: integer, minimum: 1, maximum: 5 }
        rating_speed: { type: integer, minimum: 1, maximum: 5 }
        rating_welcome: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, maxLength: 2000 }

    EstablishmentPage:
      type: object
      description: A cursor-paginated page of establishment summaries.
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EstablishmentSummary"
        next_cursor:
          type: string
          description: Pass back as `?cursor=`; absent on the last page.

    ReviewPage:
      type: object
      description: A cursor-paginated page of reviews.
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReviewItem"
        next_cursor:
          type: string
          description: Pass back as `?cursor=`; absent on the last page.
