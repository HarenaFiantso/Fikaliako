spring:
  # No embedded PostGIS: in-memory H2 for the context smoke test, Flyway
  # migrations (PostGIS SQL) disabled. Testcontainers will take over once
  # the first entities land.
  datasource:
    url: jdbc:h2:mem:fikaliako;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  # Mirror the production serialization contract so slice tests assert the
  # real wire format (snake_case, non-null). Keep in sync with main config.
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

# This file fully shadows the main application.yml, so the auth block must be
# duplicated for slice tests that import SecurityConfig.
fikaliako:
  auth:
    jwt-secret: test-only-fikaliako-jwt-secret-0123456789abcdef
    issuer: fikaliako-api
    access-token-ttl: 15m
    refresh-token-ttl: 30d
    otp-ttl: 10m
    otp-max-per-hour: 5
    otp-max-attempts: 5
