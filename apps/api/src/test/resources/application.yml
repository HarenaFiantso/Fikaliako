spring:
  # No embedded PostGIS: in-memory H2 for the context smoke test, Flyway
  # migrations (PostGIS SQL) disabled. Testcontainers will take over once
  # the first entities land.
  datasource:
    url: jdbc:h2:mem:fikaliako;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
