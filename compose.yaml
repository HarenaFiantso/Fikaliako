services:
  postgres:
    image: postgis/postgis:16-3.4
    labels:
      # non-standard image name (postgis/postgis): tells Spring Boot this is a Postgres service
      org.springframework.boot.service-connection: postgres
    environment:
      POSTGRES_DB: fikaliako
      POSTGRES_USER: fikaliako
      POSTGRES_PASSWORD: fikaliako
    ports:
      # host port 5434: 5432 is taken by the system PostgreSQL service
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - '6379:6379'

volumes:
  pgdata:
