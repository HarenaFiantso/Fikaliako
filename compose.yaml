services:
  postgres:
    image: postgis/postgis:16-3.4
    labels:
      # non-standard image name (postgis/postgis): tells Spring Boot this is a Postgres service
      org.springframework.boot.service-connection: postgres
    environment:
      POSTGRES_DB: fikaliako
      POSTGRES_USER: fikaliako
      POSTGRES_PASSWORD: fikaliako
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
