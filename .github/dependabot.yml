version: 2
updates:
  # pnpm workspace (web app + TS packages)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore(deps)
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  # Spring Boot API
  - package-ecosystem: gradle
    directory: /apps/api
    schedule:
      interval: monthly
    commit-message:
      prefix: chore(deps)
    groups:
      gradle-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  # Local dev services (PostGIS, Redis) in compose.yaml
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore(deps)

  # CI workflows (none yet — activates as they land)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore(deps)
